<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact Yamaha</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Yamaha Contact </h1>

  <nav>
    <a href="index.html">Home</a>
    <a href="bikes.html">Bikes</a>
    <a href="contact.html">Contact</a>
    <a href="https://www.yamaha-motor.com" target="_blank">Official Site</a>
  </nav>
</header>

<section class="contact-container">

  <h2>Get in Touch</h2>

  <div class="contact-box">

   
    <div class="contact-info">
      <h3>Contact Information</h3>
      <p><strong>Email:</strong> info@yamaha.com</p>
      <p><strong>Phone:</strong> +38 111 222 333</p>
      <p><strong>Location:</strong> Japan</p>
    </div>

   
    <div class="contact-form">
      <h3>Send a Message</h3>

      <form>
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="Your Message" rows="5" required></textarea>
        <button type="submit">Send Message</button>
      </form>

    </div>

  </div>

</section>

<footer>
  <p>&copy; 2026 Yamaha Page</p>
</footer>

</body>
</html>
